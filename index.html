<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salvo</title>

  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/request.css">
  <link rel="stylesheet" href="css/response.css">
  <link rel="stylesheet" href="css/modals.css">
</head>
<body>

<div id="app">

  <!-- ── Topbar ─────────────────────────────────────────────────────────── -->
  <div id="topbar">
    <img src="img/favicon.svg" alt="" width="20" height="20" style="vertical-align:middle;border-radius:4px;margin-right:6px">
    <span class="logo">Salvo</span>
    <span class="tb-div" style="display:none"></span>
    <select id="env-select" style="display:none;width:150px;padding:3px 7px;font-size:12px"></select>
    <button style="display:none" onclick="openEnvModal()">Manage Env</button>
    <div class="sep"></div>
    <span id="save-status" style="font-size:11px;color:#8b949e">All changes saved</span>
    <button onclick="exportAll()" title="Download all collections as a JSON file">Export</button>
    <label style="display:flex;align-items:center;cursor:pointer"
           title="Import a Salvo export or Postman collection (.json) — merges with existing collections, skipping duplicate request names">
      Import
      <input type="file" accept=".json" onchange="importAny(event)" style="display:none">
    </label>
  </div>

  <!-- ── Workspace ──────────────────────────────────────────────────────── -->
  <div id="workspace">

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sb-search-row">
        <input id="search-input" placeholder="Search…" oninput="renderSidebar()">
        <button id="search-clear" style="display:none;color:#f85149;padding:0 5px"
                onclick="document.getElementById('search-input').value='';renderSidebar();this.style.display='none'">✕</button>
      </div>
      <div id="sb-actions">
        <button class="btn-primary" onclick="addCollection()">+ New</button>
      </div>
      <div id="col-list"></div>
      <div id="sb-bottom">
        <button id="hist-toggle" onclick="toggleHistPanel()">⏱ History</button>
      </div>
    </div>

    <!-- Drag-resize handle -->
    <div id="resizer"></div>

    <!-- Main content area -->
    <div id="main">

      <!-- Empty state -->
      <div id="empty-state">
        <div class="icon">⬡</div>
        <h3>Select or create a request</h3>
        <span>Use the sidebar to get started — changes are saved to disk automatically</span>
      </div>

      <!-- Request editor (hidden until a request is selected) -->
      <div id="req-editor" style="display:none;flex-direction:column;flex:1;overflow:hidden">

        <!-- URL bar -->
        <div id="url-bar">
          <select id="method-select" onchange="onMethodChange()">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>PATCH</option>
            <option>DELETE</option>
            <option>HEAD</option>
            <option>OPTIONS</option>
          </select>
          <input id="url-input" type="text"
                 placeholder="https://api.example.com/endpoint {{var}}"
                 oninput="state.req.url=this.value;scheduleAutoSave();renderReqPanel()"
                 onkeydown="if(event.key==='Enter')sendRequest()">
          <button id="send-btn" class="btn-primary" onclick="sendRequest()">Send</button>
        </div>

        <!-- Request tabs: Params / Headers / Auth / Body / cURL -->
        <div class="tabbar" id="req-tabbar">
          <button class="tab active" data-tab="params"  onclick="switchReqTab('params')">Params</button>
          <button class="tab"        data-tab="headers" onclick="switchReqTab('headers')">Headers</button>
          <button class="tab"        data-tab="auth"    onclick="switchReqTab('auth')">Auth</button>
          <button class="tab"        data-tab="body"    onclick="switchReqTab('body')">Body</button>
          <button class="tab"        data-tab="curl"    onclick="switchReqTab('curl')">cURL</button>
          <div class="sep"></div>
          <input id="req-name-input"
                 oninput="onReqNameChange(this.value)"
                 onfocus="this.style.border='1px solid #30363d'"
                 onblur="this.style.border='1px solid transparent'">
        </div>

        <!-- Request panel (params / headers / auth / body / curl) -->
        <div id="req-panel" class="panel"></div>

        <!-- Response section -->
        <div id="resp-section">
          <div id="resp-header">
            <span class="resp-label">RESPONSE</span>
            <span id="status-badge" style="display:none"></span>
            <span id="resp-time"    style="font-size:11px;color:#8b949e;display:none"></span>
            <span id="resp-size"    style="font-size:11px;color:#8b949e;display:none"></span>
            <div class="sep"></div>
            <button class="tab active" data-rtab="body"    onclick="switchRespTab('body')"    style="padding:3px 10px">Body</button>
            <button class="tab"        data-rtab="headers" onclick="switchRespTab('headers')" style="padding:3px 10px">Headers</button>
            <button id="copy-resp-btn" onclick="copyResponse()" style="font-size:11px;display:none">Copy</button>
          </div>
          <div id="resp-body-wrap">
            <span class="muted">Press Send to execute the request</span>
          </div>
        </div>

      </div><!-- #req-editor -->

      <!-- History panel (shown via toggle) -->
      <div id="hist-panel" style="display:none">
        <div class="hist-header">
          <span class="hist-label">HISTORY</span>
          <button onclick="clearHistory()" style="color:#f85149;font-size:11px">Clear</button>
        </div>
        <div id="hist-list"></div>
      </div>

    </div><!-- #main -->

  </div><!-- #workspace -->

</div><!-- #app -->

<!-- ── Environment Modal ─────────────────────────────────────────────────── -->
<div id="env-modal" class="modal-bg" style="display:none"
     onclick="if(event.target===this)closeEnvModal()">
  <div class="modal" style="min-width:580px;max-width:680px" onclick="event.stopPropagation()">
    <h3>Environments</h3>
    <div class="env-layout">
      <div class="env-list" id="env-list-panel"></div>
      <div id="env-detail-panel"></div>
    </div>
  </div>
</div>

<!-- ── Context Menu (positioned by JS) ──────────────────────────────────── -->
<div id="ctx-menu" class="ctx-menu" style="display:none"></div>

<!-- ── Header value autocomplete (positioned by JS) ─────────────────────── -->
<div id="header-suggest" class="header-suggest" style="display:none"></div>

<!-- ── JavaScript — load order matters ──────────────────────────────────── -->
<script src="js/state.js"></script>       <!-- constants, state, storage, utils  -->
<script src="js/sidebar.js"></script>     <!-- sidebar rendering & context menus -->
<script src="js/curl.js"></script>        <!-- curl command generation            -->
<script src="js/request.js"></script>     <!-- request editor panels             -->
<script src="js/response.js"></script>    <!-- response panel & JSON tree        -->
<script src="js/send.js"></script>        <!-- fetch execution                   -->
<script src="js/collections.js"></script> <!-- collection / folder / req CRUD    -->
<script src="js/modals.js"></script>      <!-- environment modal                 -->
<script src="js/app.js"></script>         <!-- init, save, resizer, history      -->

</body>
</html>
